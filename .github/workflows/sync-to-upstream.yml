name: Sync to Upstream

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/ko2527600/Kokrobite-Oais.git || true
          git fetch upstream
      
      - name: Push to upstream
        env:
          UPSTREAM_TOKEN: ${{ secrets.UPSTREAM_SYNC_TOKEN }}
        run: |
          if [ -n "$UPSTREAM_TOKEN" ]; then
            git push https://x-access-token:${UPSTREAM_TOKEN}@github.com/ko2527600/Kokrobite-Oais.git main
            echo "✓ Successfully synced to upstream repository"
          else
            echo "⚠ UPSTREAM_SYNC_TOKEN not configured. Skipping upstream sync."
            echo "To enable automatic syncing, add a Personal Access Token as a repository secret named UPSTREAM_SYNC_TOKEN"
          fi
